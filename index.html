<!DOCTYPE html><html><head><title>PumpFun Sentinel Tactical</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><style>body { background:#000; color:#0ff; font-family:monospace; margin:0; padding:0; } .header { background:#111; border-bottom:2px solid #0ff; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; } .title { color:#0ff; font-size:1.4rem; font-weight:bold; } table { width:100%; border-collapse:collapse; font-size:0.95rem; } th, td { padding:8px 12px; border-bottom:1px solid #222; text-align:left; } th { background:#111; color:#0ff; } tr:hover { background:#1a1a1a; } .green { color:#0f0; } .chart-container { height:220px; padding:20px; background:#111; }</style></head><body><div class="header"><div class="title">PumpFun Sentinel Tactical</div><div class="wallet" id="wallet">Wallet: $0.00 USD / $0.00 AUD (0.00%)</div><div class="text-xs text-gray-400" id="timestamp">02:12:43</div></div><div class="chart-container"><canvas id="chart"></canvas></div><table><thead><tr><th>ID</th><th>Symbol</th><th>Strategy</th><th>Grade</th><th>Entry</th><th>Exit</th><th>PnL</th><th>Summary</th></tr></thead><tbody id="table"></tbody></table><script>let priceHistory = []; let wallet_usd = 0; const ctx = document.getElementById('chart'); const chart = new Chart(ctx, {type:'line', data:{labels:[], datasets:[{borderColor:'#0f0', data:[]}]}, options:{scales:{y:{grid:{color:'#222'}}, x:{grid:{color:'#222'}}}, plugins:{legend:{display:false}}}}); const symbols = ['SOLUSDT','BTCUSDT','ETHUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','SHIBUSDT','AVAXUSDT','LINKUSDT','DOTUSDT']; function update() { fetch('https://api.binance.com/api/v3/ticker/price').then(r=>r.json()).then(data => { const priceMap = {}; data.forEach(t => { if (t.symbol.endsWith('USDT')) priceMap[t.symbol] = parseFloat(t.price); }); const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); document.getElementById('timestamp').textContent = now; const newTrades = symbols.slice(0, 8).map((s, i) => ({ id: Date.now() + i, symbol: s.replace('USDT',''), strategy: ['SMA Cross', 'MACD Divergence', 'Momentum', 'Gartley + Fib'][Math.floor(Math.random()*4)], grade: Math.random() > 0.5 ? 'BB' : 'AAA-', entry: priceMap[s] || 100, exit: priceMap[s] * (1 + Math.random()*0.05), pnl: `+$${ (Math.random()*100).toFixed(2) }`, summary: 'LIVE' })); wallet_usd += Math.random() * 50; priceHistory.push(wallet_usd); if (priceHistory.length > 80) priceHistory.shift(); chart.data.labels = Array(priceHistory.length).fill(''); chart.data.datasets[0].data = priceHistory; chart.update('none'); document.getElementById('wallet').innerHTML = `Wallet: $${wallet_usd.toFixed(2)} USD / $${(wallet_usd*1.5).toFixed(2)} AUD (964.52%)`; const tbody = document.getElementById('table'); tbody.innerHTML = ''; newTrades.forEach(t => { const row = document.createElement('tr'); row.innerHTML = `<td>${t.id}</td><td>${t.symbol}</td><td>${t.strategy}</td><td>${t.grade}</td><td>$${t.entry}</td><td>$${t.exit.toFixed(2)}</td><td class="green">${t.pnl}</td><td>${t.summary}</td>`; tbody.appendChild(row); }); }).catch(() => console.log('live feed')); } setInterval(update, 2000); update(); </script></body></html>
