version: '3.9'
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./data:/freqtrade/user_data/data
    command: trade --strategy SentinelTactical --config /freqtrade/user_data/config.json --dry-run
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8787:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - freqtrade